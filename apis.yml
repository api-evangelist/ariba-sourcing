apis:
  - aid: ariba-sourcing:ariba-sourcing-external-approval-api
    name: Ariba Sourcing - External Approval API
    description: >-
      The External Approval API for Sourcing and Supplier Management enables
      client applications to approve or deny SAP Ariba strategic sourcing
      approval tasks. It supports external approval tasks in sourcing projects,
      contract workspaces, engagement risk assessment, and all types of supplier
      management projects.
