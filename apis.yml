  - type: Features
    data:
      - name: External Approval Workflow
        description: >-
          Enables external systems to retrieve, review, and approve or deny
          SAP Ariba sourcing approval tasks programmatically.
      - name: Multi-Document Type Support
        description: >-
          Supports approval tasks for sourcing projects, RFX documents, contract
          workspaces, contract content, and supplier management projects.
      - name: Rate-Limited API Access
        description: >-
          Well-defined rate limits of 20 req/sec, 400 req/min, 12000 req/hour,
          and 40000 req/day for production stability.
      - name: Pagination Support
        description: >-
          Results pagination with offset and limit parameters plus
          X-Total-Count headers for efficient data retrieval.
      - name: Group-Based Approval
        description: >-
          Supports approval flows with groups, enabling retrieval of group
          membership to identify eligible approvers.
      - name: Attachment Downloads
        description: >-
          Enables downloading attachments associated with approvable documents
          for review prior to approval decisions.
  - type: UseCases
    data:
      - name: Automated Sourcing Approvals
        description: >-
          Automate the approval workflow for sourcing events and contracts by
          polling for pending tasks and submitting programmatic approval actions.
      - name: ERP-Integrated Approvals
        description: >-
          Route SAP Ariba sourcing approval tasks to external ERP or workflow
          systems for approval by authorized personnel.
      - name: Supplier Onboarding Approval
        description: >-
          Manage external approval of supplier registration and onboarding
          projects through the supplier management approval workflow.
      - name: Contract Approval Automation
        description: >-
          Integrate contract workspace approvals with enterprise contract
          management systems for streamlined legal and commercial review.
  - type: Integrations
    data:
      - name: SAP ERP
        description: >-
          Route sourcing approval tasks to SAP ERP workflows and approval
          hierarchies.
      - name: SAP Integration Suite
        description: >-
          Orchestrate approval workflows across SAP Ariba and connected systems
          using SAP Integration Suite.
      - name: SAP Ariba Contracts
        description: >-
          Approve contract workspaces and contract content documents through the
          external approval API.
      - name: SAP Ariba Supplier Management
        description: >-
          Approve supplier lifecycle and performance management projects and
          supplier registration requests.
